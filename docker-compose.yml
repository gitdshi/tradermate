version: '3.4'

services:
  # TraderMate API Service
  api:
    image: tradermate-api:latest
    build:
      context: .
      dockerfile: ./Dockerfile.api
    container_name: tradermate_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # App Settings
      - APP_NAME=TraderMate
      - APP_VERSION=1.0.0
      - DEBUG=true
      # MySQL Settings
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TUSHARE_DATABASE=tushare
      - VNPY_DATABASE=vnpy
      # Redis Settings
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # JWT Settings
      - JWT_SECRET_KEY=${SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      # CORS Settings
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    networks:
      - tradermate_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Background Worker Service
  worker:
    image: tradermate-api:latest
    build:
      context: .
      dockerfile: ./Dockerfile.api
    container_name: tradermate_worker
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TUSHARE_DATABASE=tushare
      - VNPY_DATABASE=vnpy
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: ["rq", "worker", "--url", "redis://redis:6379", "backtest", "optimization"]
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    networks:
      - tradermate_network

  # Original TraderMate Service (VN.py strategies)
  tradermate:
    image: tradermate:0.0.1
    build:
      context: .
      dockerfile: ./Dockerfile
    depends_on:
      - mysql
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TUSHARE_DATABASE_URL=mysql+pymysql://root:password@mysql:3306/tushare?charset=utf8mb4
      - VNPY_DATABASE_URL=mysql+pymysql://root:password@mysql:3306/vnpy?charset=utf8mb4
    networks:
      - tradermate_network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: tradermate_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - tradermate_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis (for job queue)
  redis:
    image: redis:7-alpine
    container_name: tradermate_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tradermate_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (tradermate-portal)
  portal:
    build:
      context: ../tradermate-portal
      dockerfile: ./Dockerfile
    container_name: tradermate_portal
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - tradermate_network

volumes:
  mysql_data:
  redis_data:

networks:
  tradermate_network:
    driver: bridge
