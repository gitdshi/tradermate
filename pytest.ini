[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: unit tests
    integration: integration tests
    asyncio: async tests
    datasync: datasync module tests
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
source = app
omit =
    */migrations/*
    */tests/*
    .venv/*
    venv/*
branch = True

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    pass
    \.\.\.
show_missing = True
skip_covered = False
fail_under = 30
